version: '3.8'
services:
  nats:
    image: nats:2.10-alpine
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - HTTP_PORT=8080
      - TOP_SIZE=20
    depends_on:
      - nats

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    depends_on:
      - nats
      - app
